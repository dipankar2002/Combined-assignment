<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎬 Movie Explorer</h1>
  </header>

  <main>
    <section class="controls">
      <div class="control-group">
        <label for="genre">Genre</label>
        <select id="genre">
          <option value="">Select a genre</option>
          <option value="28">Action</option>
          <option value="12">Adventure</option>
          <option value="16">Animation</option>
          <option value="35">Comedy</option>
          <option value="80">Crime</option>
          <option value="99">Documentary</option>
          <option value="18">Drama</option>
          <option value="14">Fantasy</option>
          <option value="27">Horror</option>
          <option value="10749">Romance</option>
          <option value="878">Science Fiction</option>
          <option value="53">Thriller</option>
        </select>
      </div>

      <div class="control-group">
        <label for="count">Number of Movies</label>
        <input type="number" id="count" min="1" max="20" value="6" />
      </div>

      <button id="searchBtn">Explore Movies</button>

      <div class="control-group sort-group">
        <label for="sortToggle">Sort by Rating</label>
        <button id="sortToggle" class="sort-btn" aria-pressed="false">Off</button>
      </div>
    </section>

    <div id="status" class="status" hidden></div>

    <section id="movieGrid" class="movie-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
