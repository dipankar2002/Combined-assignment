<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain"></div>

    <header class="hero">
      <p class="eyebrow">GLOBAL KITCHEN</p>
      <h1>Recipe Finder</h1>
      <p>
        Explore recipes by cuisine, choose how many cards you want, and open rich details with ingredients and steps.
      </p>
    </header>

    <main class="app-shell">
      <section class="controls" aria-label="Recipe filters">
        <div class="control-group">
          <label for="cuisineSelect">Cuisine</label>
          <select id="cuisineSelect">
            <option value="Italian">Italian</option>
            <option value="Indian">Indian</option>
            <option value="Chinese">Chinese</option>
            <option value="Mexican">Mexican</option>
            <option value="French">French</option>
            <option value="British">British</option>
            <option value="Japanese">Japanese</option>
            <option value="American">American</option>
            <option value="Thai">Thai</option>
            <option value="Spanish">Spanish</option>
            <option value="Moroccan">Moroccan</option>
            <option value="Turkish">Turkish</option>
          </select>
        </div>

        <div class="control-group">
          <label for="recipeLimit">Recipes to show</label>
          <input id="recipeLimit" type="number" min="1" max="12" value="6" />
        </div>

        <button id="searchBtn" class="search-btn" type="button">Find Recipes</button>
      </section>

      <section class="status-wrap" aria-live="polite">
        <p id="status" class="status"></p>
      </section>

      <section id="recipeGrid" class="recipe-grid" aria-label="Recipe results"></section>
    </main>

    <template id="recipeCardTemplate">
      <article class="recipe-card">
        <img class="recipe-image" src="" alt="" loading="lazy" />
        <div class="recipe-content">
          <h2 class="recipe-title"></h2>
          <p class="recipe-description"></p>
          <button type="button" class="details-btn">View Details</button>
        </div>
      </article>
    </template>

    <dialog id="recipeModal" class="recipe-modal">
      <button id="closeModalBtn" class="close-modal-btn" type="button" aria-label="Close details">
        Close
      </button>
      <img id="modalImage" src="" alt="" />
      <h3 id="modalTitle"></h3>
      <p id="modalMeta"></p>
      <section>
        <h4>Ingredients</h4>
        <ul id="modalIngredients"></ul>
      </section>
      <section>
        <h4>Instructions</h4>
        <p id="modalInstructions"></p>
      </section>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
